<!-- ================================================================
     NEWS SECTION — sections/news.html

     The Bluesky live feed is loaded automatically by js/main.js
     using the public AT Protocol API (no key required).
     Posts from @nmoraislab.bsky.social appear in the grid below.

     To change the Bluesky handle, edit the HANDLE constant in
     js/main.js.

     To update social button URLs, edit the <a href="..."> values
     in the .news-social-links block below.
     ================================================================ -->
<section id="news">
  <div class="container">

    <span class="section-label fade-up">Latest</span>
    <h2 class="section-title fade-up">News &amp; updates</h2>

    <p class="section-intro fade-up">
      Follow us for real-time lab updates, paper announcements, and more.
    </p>

    <!-- Social follow buttons — EDIT HREF values here -->
    <div class="news-social-links fade-up" style="margin-bottom:2.5rem; justify-content:center;">

      <a class="news-social-btn"
         href="https://bsky.app/profile/nmoraislab.bsky.social"
         target="_blank" rel="noopener">
        <!-- Bluesky butterfly logo (Simple Icons, 24×24) -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 10.8c-1.087-2.114-4.046-6.053-6.798-7.995C2.566.944 1.347.906.36 1.495c-1.066.637-.31 2.83.098 4.39l1.716 6.463c-2.187-.211-4.04.354-4.174 2.07-.144 1.84 1.65 3.002 3.476 3.184 1.083.108 2.216-.068 3.131-.432-1.524 1.22-2.607 3.082-2.607 5.83H12v.004-.004c0-2.748-1.083-4.61-2.607-5.83.915.364 2.048.54 3.131.432 1.826-.182 3.62-1.344 3.476-3.184-.134-1.716-1.987-2.281-4.174-2.07L13.542 5.885c.408-1.56 1.164-3.753.098-4.39C12.653.906 11.434.944 8.798 2.805 6.046 4.747 3.087 8.686 2 10.8"/>
        </svg>
        Bluesky
      </a>

      <a class="news-social-btn"
         href="https://www.linkedin.com/company/disease-transcriptomics-lab"
         target="_blank" rel="noopener">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6zM2 9h4v12H2z"/>
          <circle cx="4" cy="4" r="2"/>
        </svg>
        LinkedIn
      </a>

      <a class="news-social-btn"
         href="https://x.com/NMoraisLab"
         target="_blank" rel="noopener">
        <!-- X / Twitter logo -->
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.738l7.726-8.836L1.254 2.25H8.08l4.254 5.622L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/>
        </svg>
        X / Twitter
      </a>

    </div>

    <!-- Live Bluesky feed — populated by loadBlueskyFeed() in main.js -->
    <div class="bsky-feed-wrap fade-up" style="transition-delay:.1s;">
      <div id="bsky-feed-grid" class="bsky-grid">
        <div class="bsky-loading">Loading posts from Bluesky…</div>
      </div>
    </div>

    <div class="bsky-footer fade-up" style="transition-delay:.2s;">
      <a class="bsky-follow-btn"
         href="https://bsky.app/profile/nmoraislab.bsky.social"
         target="_blank" rel="noopener">
        See more on Bluesky ↗
      </a>
    </div>

  </div>
</section>
